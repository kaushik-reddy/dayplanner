name: Build unsigned iOS IPA

# Builds an UNSIGNED .ipa on a GitHub-hosted macOS runner so it can be installed
# with Sideloadly (which re-signs it with your free Apple ID at install time).
# Trigger it manually from the Actions tab ("Run workflow"), or it runs on push to ios-app.

on:
  workflow_dispatch:
  push:
    branches: [ios-app]
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use newest Xcode 16 (RN 0.81 needs >= 16.1)
        run: |
          LATEST=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$LATEST" ]; then LATEST=/Applications/Xcode.app; fi
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Expo prebuild (generate native ios/ project)
        env:
          EXPO_NO_TELEMETRY: '1'
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Detect workspace + scheme
        id: xc
        run: |
          cd ios
          WS=$(basename "$(ls -d *.xcworkspace | head -n 1)")
          SCHEME="${WS%.xcworkspace}"
          echo "workspace=$WS"   >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME"  >> "$GITHUB_OUTPUT"
          echo "Using workspace=$WS scheme=$SCHEME"

      - name: Build unsigned archive
        run: |
          cd ios
          xcodebuild \
            -workspace "${{ steps.xc.outputs.workspace }}" \
            -scheme "${{ steps.xc.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            archive

      - name: Package unsigned .ipa
        run: |
          APPDIR="$RUNNER_TEMP/app.xcarchive/Products/Applications"
          cd "$APPDIR"
          mkdir -p Payload
          cp -R *.app Payload/
          zip -qry "$RUNNER_TEMP/DayPlanner-unsigned.ipa" Payload
          ls -lh "$RUNNER_TEMP/DayPlanner-unsigned.ipa"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: DayPlanner-unsigned-ipa
          path: ${{ runner.temp }}/DayPlanner-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
